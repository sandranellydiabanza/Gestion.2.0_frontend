<div
  class="fixed bottom-6 right-6 z-50 flex items-center gap-3 px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-2xl shadow-2xl shadow-slate-950/40 page-fade-enter min-w-[280px]"
>

  <!-- Icon -->
  <div>

    @if(type === 'success'){

      <lucide-angular
        [img]="CheckCircle"
        class="h-5 w-5 text-emerald-400"
      ></lucide-angular>

    } @else {

      <lucide-angular
        [img]="AlertTriangle"
        class="h-5 w-5 text-red-400"
      ></lucide-angular>

    }

  </div>

  <!-- Message -->
  <div class="flex-1 text-sm font-medium pr-2 text-slate-100">
    {{ message }}
  </div>

  <!-- Close Button -->
  <button
    (click)="onClose()"
    class="p-1 rounded-md text-slate-400 hover:text-white transition-colors cursor-pointer"
  >

    <lucide-angular
      [img]="X"
      class="h-4 w-4"
    ></lucide-angular>

  </button>

</div>
