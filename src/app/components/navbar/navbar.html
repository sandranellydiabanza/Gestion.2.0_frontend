<header
  class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30 shadow-sm"
>
  <!-- LEFT -->
  <div class="flex items-center gap-4">

    <!-- Sidebar toggle -->
    <button
      (click)="onToggleSidebar.emit()"
      class="p-1.5 rounded-lg text-slate-500 hover:text-slate-800 hover:bg-slate-100 lg:hidden transition-colors"
    >
      <lucide-angular
        [img]="MenuIcon"
        class="h-5 w-5"
      ></lucide-angular>
    </button>

    <!-- Title -->
    <h1 class="text-xl font-bold text-slate-800 tracking-tight">
      {{ getPageTitle(currentRoute) }}
    </h1>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-4">

 

    <!-- UTC -->
    <div
      class="hidden lg:flex flex-col items-end text-[11px] font-mono text-slate-400"
    >
      <span class="font-semibold text-slate-500">
        20 mai 2026
      </span>

      <span>04:41 UTC</span>
    </div>

    <!-- Notifications -->
    <button
      (click)="onNavigate.emit('notifications')"
      class="relative p-2 rounded-xl text-slate-500 hover:text-sky-500 hover:bg-sky-50 transition-all"
    >
      <lucide-angular
        [img]="BellIcon"
        class="h-5 w-5"
      ></lucide-angular>

      <span
        *ngIf="unreadCount > 0"
        class="absolute top-1 right-1 h-3.5 w-3.5 bg-red-500 text-[9px] font-bold text-white flex items-center justify-center rounded-full animate-bounce"
      >
        {{ unreadCount }}
      </span>
    </button>

    <!-- Profile -->
    <div
      (click)="onNavigate.emit('profile')"
      class="flex items-center gap-2 pl-2 border-l border-slate-200 cursor-pointer hover:opacity-80 transition-opacity"
    >
      <img
        [src]="
          currentUser?.avatarUrl ||
          'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop'
        "
        alt="My profile"
        referrerpolicy="no-referrer"
        class="h-8.5 w-8.5 rounded-full object-cover ring-2 ring-sky-500/10"
      />
    </div>

  </div>
</header>
