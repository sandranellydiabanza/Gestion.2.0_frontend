@if(currentUser){

  <!-- Mobile Backdrop -->
  @if(isOpen){
    <div
      class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 lg:hidden transition-opacity"
      (click)="onToggle()"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 border-r border-slate-800 flex flex-col justify-between transition-transform duration-300 transform lg:translate-x-0"
    [class.translate-x-0]="isOpen"
    [class.-translate-x-full]="!isOpen"
    [class.lg\:static]="true"
    [class.lg\:h-screen]="true"
  >

    <!-- Header -->
    <div>

      <div class="h-16 flex items-center justify-between px-6 border-b border-slate-800">

        <div class="flex items-center gap-3">

          <div class="h-9 w-9 bg-sky-500 rounded-lg flex items-center justify-center text-white ring-4 ring-sky-500/20">
            <lucide-angular
              [img]="Trophy"
              class="h-5 w-5"
            ></lucide-angular>
          </div>

          <div class="flex flex-col">
            <span class="font-bold text-lg text-white tracking-tight">
              IUSJ <span class="text-emerald-400">Sports</span>
            </span>

            <span class="text-[10px] text-sky-400 font-mono tracking-wider font-semibold">
              PORTAIL ATHLÉTIQUE
            </span>
          </div>

        </div>

        <!-- Close button -->
        <button
          (click)="onToggle()"
          class="lg:hidden p-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
        >
          <lucide-angular
            [img]="X"
            class="h-5 w-5"
          ></lucide-angular>
        </button>

      </div>

      <!-- Navigation -->
      <nav class="p-4 space-y-1.5">

        @for(item of navItems; track item.id){

          <button
            (click)="onNavigate(item.id)"
            class="w-full flex items-center justify-between gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all group"
            [ngClass]="
              currentRoute === item.id
                ? 'bg-sky-500 text-white shadow-lg shadow-sky-500/10'
                : 'text-slate-400 hover:text-white hover:bg-slate-800/60'
            "
          >

            <div class="flex items-center gap-3">

              <lucide-angular
                [img]="item.icon"
                class="h-4.5 w-4.5"
              ></lucide-angular>

              <span>{{ item.label }}</span>

            </div>

            @if(item.badge > 0){
              <span
                class="text-[10px] font-bold px-2 py-0.5 rounded-full"
                [ngClass]="
                  currentRoute === item.id
                    ? 'bg-white text-sky-500'
                    : 'bg-emerald-500 text-white'
                "
              >
                {{ item.badge }}
              </span>
            }

          </button>

        }

      </nav>

    </div>

    <!-- User card -->
    <div class="p-4 border-t border-slate-800 bg-slate-950/40">

      <div class="flex items-center gap-3 mb-4">

        <img
          [src]="currentUser.avatarUrl || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop'"
          [alt]="currentUser.firstName + ' ' + currentUser.lastName"
          referrerpolicy="no-referrer"
          class="h-10 w-10 rounded-full object-cover ring-2 ring-emerald-500/20"
        />

        <div class="flex-1 min-w-0">

          <p class="text-xs font-semibold text-white truncate">
            {{ currentUser.firstName }}
            {{ currentUser.lastName }}
          </p>

          <p class="text-[10px] font-mono text-emerald-400 truncate">
            {{ currentUser.role }}
          </p>

        </div>

      </div>

      <button
        (click)="onLogout()"
        class="w-full flex items-center justify-center gap-2 px-4 py-2 text-xs font-medium text-slate-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg border border-slate-800 hover:border-red-500/20 transition-all cursor-pointer"
      >

        <lucide-angular
          [img]="LogOut"
          class="h-3.5 w-3.5"
        ></lucide-angular>

        <span>Déconnexion</span>

      </button>

    </div>

  </aside>

}
