






@if (currentUser) {
<div class="h-screen flex overflow-hidden bg-slate-50 font-sans">

  <!-- Sidebar -->
  <app-sidebar
    class="w-64 h-full flex-shrink-0"
    [currentRoute]="currentRoute"
    [currentUser]="currentUser"
    [unreadCount]="unreadCount"
    [isOpen]="sidebarOpen"
    (navigate)="navigate($event)"
    (logout)="handleLogout()"
    (toggle)="toggleSidebar()"
  >
  </app-sidebar>

  <!-- Zone droite -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Navbar -->
    <app-navbar
      class="h-16 border-b bg-white"
      [currentRoute]="currentRoute"
      [currentUser]="currentUser"
      [unreadCount]="unreadCount"
      (navigate)="navigate($event)"
      (toggleSidebar)="toggleSidebar()"
      (roleChange)="handleRoleChange($event)"
    >
    </app-navbar>

<app-main/>
  </div>

</div>
} @else {

  <!-- Page de login -->
  <div >
    <app-login (loginSuccess)="handleLoginSuccess($event)"></app-login>
  </div>

}
