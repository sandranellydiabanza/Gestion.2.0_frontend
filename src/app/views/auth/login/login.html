<div
  class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden"
>
  <!-- Decorative spots -->
  <div
    class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-sky-400/10 rounded-full blur-3xl pointer-events-none"
  ></div>

  <div
    class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-emerald-400/10 rounded-full blur-3xl pointer-events-none"
  ></div>

  <!-- Header -->
  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 text-center">
    <div
      class="mx-auto h-16 w-16 bg-sky-500 rounded-2xl flex items-center justify-center text-white ring-8 ring-sky-500/10 shadow-xl shadow-sky-500/20 mb-6"
    >
      🏆
    </div>

    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
      IUSJ <span class="text-sky-500 font-bold">Sports</span>
    </h2>

    <p class="mt-2 text-sm text-slate-500">
      Institut Universitaire Saint-Jean • Portail des Compétitions
    </p>
  </div>

  <!-- Card -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div
      class="bg-white py-8 px-4 shadow-xl shadow-slate-200/50 rounded-3xl border border-slate-100 sm:px-10"
    >
      <form class="space-y-6" (ngSubmit)="handleSubmit()">
        <!-- Email -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
          >
            Adresse e-mail académique
          </label>

          <input
            type="email"
            required
            [(ngModel)]="email"
            name="email"
            placeholder="nom.prenom@iusj.org"
            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:border-sky-500 focus:bg-white focus:ring-1 focus:ring-sky-500 rounded-xl text-slate-800 text-sm font-medium transition-all"
          />
        </div>

        <!-- Roles -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
          >
            Rôle de connexion
          </label>

          <div class="grid grid-cols-2 gap-2">
            @for (r of roles; track r) {
              <button
                type="button"
                (click)="role = r"
                class="px-3 py-2.5 rounded-xl border text-xs font-semibold text-left transition-all"
                [ngClass]="
                  role === r
                    ? 'bg-sky-500/10 border-sky-500 text-sky-700 font-bold'
                    : 'border-slate-200 hover:bg-slate-50 text-slate-600'
                "
              >
                {{ r }}
              </button>
            }
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full flex justify-center items-center gap-2 py-3.5 px-4 rounded-xl text-sm font-semibold text-white bg-sky-500 hover:bg-sky-600 active:bg-sky-700 shadow-lg shadow-sky-500/25 transition-all disabled:opacity-50"
        >
          @if (!loading) {
            <span>Accéder au Portail →</span>
          } @else {
            <span>Chargement...</span>
          }
        </button>
      </form>

      <!-- Quick accounts -->
      <div class="mt-8 border-t border-slate-100 pt-6">
        <span
          class="block text-center text-xs text-slate-400 font-medium mb-4"
        >
          COMPTES DE TEST RAPIDES
        </span>

        <div class="grid grid-cols-2 gap-2">
          @for (account of quickAccounts; track account.email) {
            <button
              type="button"
              (click)="handleQuickSelect(account.email, account.role)"
              class="p-2 border border-slate-100 rounded-xl bg-slate-50 text-left hover:bg-slate-100 text-slate-700 transition-all text-xs"
            >
              <span class="block font-bold truncate">
                {{ account.name }}
              </span>

              <span class="text-[10px] text-slate-400 font-mono">
                {{ account.email }}
              </span>
            </button>
          }
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="mt-6 text-center text-[11px] text-slate-400 font-medium flex flex-col justify-center gap-1"
    >
      <span>
        Institut Universitaire Saint-Jean (SJI • SJSM • Vogt • CPGE)
      </span>

      <span class="font-mono text-[9px]">
        Django Backend API Security Secured via JWT
      </span>
    </div>
  </div>
</div>
